<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <style>
        body{font-family:Arial;background:#f4f6fb;}
        .container{width:450px;margin:80px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.15);}
        input{width:100%;padding:10px;margin-bottom:15px;border-radius:6px;border:1px solid #ccc;}
        button{width:100%;padding:12px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <h2>Add Student</h2>
        <form method="POST">
            <input type="text" name="name" placeholder="Student Name" required>
            <input type="text" name="roll_number" placeholder="Roll Number" required>
            <button type="submit">Add Student</button>
        </form>
    </div>
</body>
</html>
