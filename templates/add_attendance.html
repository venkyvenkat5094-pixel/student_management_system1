<!DOCTYPE html>
<html>
<head>
    <title>Add Attendance</title>
    <style>
        body{font-family:Arial;background:#f4f6fb;}
        .container{width:450px;margin:80px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.15);}
        select,input{width:100%;padding:10px;margin-bottom:15px;border-radius:6px;border:1px solid #ccc;}
        button{width:100%;padding:12px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <h2>Add Attendance</h2>
        <form method="POST">
            <select name="student_id" required>
                {% for s in students %}
                <option value="{{ s.id }}">{{ s.name }} ({{ s.roll_number }})</option>
                {% endfor %}
            </select>

            <input type="date" name="date" value="{{ today }}" required>

            <select name="status" required>
                <option value="Present">Present</option>
                <option value="Absent">Absent</option>
            </select>

            <button type="submit">Save Attendance</button>
        </form>
    </div>
</body>
</html>
