<!DOCTYPE html>
<html>
<head>
    <title>Add Admin</title>
    <style>
        body{font-family:Arial;background:#f4f6fb;margin:0;padding:0;}
        .container{width:420px;margin:80px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.15);}
        h2{text-align:center;margin-bottom:25px;}
        input{width:100%;padding:10px;margin-bottom:15px;border-radius:6px;border:1px solid #ccc;}
        button{width:100%;padding:12px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer;}
        .back{text-align:center;margin-top:15px;}
        .back a{text-decoration:none;color:#2563eb;font-weight:bold;}
        .error{color:red;text-align:center;margin-bottom:10px;}
    </style>
</head>
<body>
    <div class="container">
        <h2>Add New Admin</h2>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="admin_id" placeholder="Admin ID given by main admin" required>
            <button type="submit">Create Admin</button>
        </form>

        <div class="back">
            <a href="/admin/dashboard">⬅ Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
