<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <style>
        body{margin:0;font-family:Arial;height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#0f172a,#2563eb);}
        .login-box{width:350px;padding:30px;border-radius:15px;background:white;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,0.3);}
        input{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ccc;}
        button{width:100%;padding:12px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;}
        a{text-decoration:none;color:#2563eb;}
        .back{margin-top:15px;}
        .error{color:red;font-size:14px;margin-bottom:10px;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Student Login</h2>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="admin_id" placeholder="Enter Admin ID" required>
            <input type="text" name="roll_number" placeholder="Enter Roll Number" required>
            <button type="submit">Login</button>
        </form>

        <div class="back">
            <a href="/">Back to Main Page</a>
        </div>
    </div>
</body>
</html>
