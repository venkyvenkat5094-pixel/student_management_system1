<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>
<style>
body{
font-family: Arial;
background:#f0f0f0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.error{
color:red;
}
</style>
</head>

<body>

<div class="box">

<h2>Student Login</h2>

<form method="POST">

<input type="text" name="roll_number" placeholder="Enter Roll Number" required>

<button type="submit">Login</button>

</form>

{% if error %}
<p class="error">{{error}}</p>
{% endif %}

</div>

</body>
</html>
