<!DOCTYPE html>
<html>
<head>
    <title>View Students</title>
    <style>
        body{font-family:Arial;background:#f4f6fb;padding:20px;}
        .card{background:white;border-radius:10px;padding:20px;box-shadow:0 5px 20px rgba(0,0,0,0.12);}
        table{width:100%;border-collapse:collapse;}
        th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left;}
        a{text-decoration:none;color:red;}
    </style>
</head>
<body>
    <div class="card">
        <h2>Students</h2>
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Roll</th>
                <th>Action</th>
            </tr>
            {% for s in students %}
            <tr>
                <td>{{ s.id }}</td>
                <td>{{ s.name }}</td>
                <td>{{ s.roll_number }}</td>
                <td><a href="/delete_student/{{ s.id }}" onclick="return confirm('Delete this student?')">Delete</a></td>
            </tr>
            {% endfor %}
        </table>
        <br>
        <a href="/admin/dashboard">⬅ Back</a>
    </div>
</body>
</html>
