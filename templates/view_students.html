<!DOCTYPE html>
<html>
<head>
    <title>View Students</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f5f6fa;
            margin:0;
            padding:40px;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h2{
            margin-bottom:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#2c3e50;
            color:white;
            padding:12px;
            text-align:left;
        }

        td{
            padding:10px;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f1f2f6;
        }

        .delete{
            color:red;
            text-decoration:none;
            font-weight:bold;
        }

        .delete:hover{
            text-decoration:underline;
        }

        .back{
            margin-top:20px;
            display:inline-block;
            text-decoration:none;
            color:#e74c3c;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Students</h2>

    <table>
        <tr>
            <th>S.No</th>
            <th>Name</th>
            <th>Roll Number</th>
            <th>Action</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ student.name }}</td>
            <td>{{ student.roll_number }}</td>
            <td>
                <a class="delete" href="/delete_student/{{ student.id }}" onclick="return confirm('Delete this student?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <a class="back" href="/admin/dashboard">← Back</a>
</div>

</body>
</html>
